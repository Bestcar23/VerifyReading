<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="세화고 독서가 인증 여부 확인 웹앱" />
    <title>세화고 독서가 인증 여부 확인</title>
    <link rel="icon" type="image/svg+xml" href="./assets/logo.svg" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="page-bg"></div>
    <main class="app-shell">
      <section class="hero-card">
        <div class="hero-top">
          <img src="./assets/logo.svg" alt="세화고 로고" class="hero-logo" />
          <span class="hero-badge">SEHWA HIGH SCHOOL</span>
        </div>

        <h1>세화고 독서가 인증 여부 확인</h1>
        <p class="hero-desc">
          학번과 성명을 입력하면 본인의 인증 결과를 조회할 수 있습니다.
        </p>

        <form id="authForm" class="search-form" autocomplete="off">
          <div class="field-wrap">
            <label for="studentId">학번</label>
            <input
              id="studentId"
              name="studentId"
              type="text"
              inputmode="numeric"
              placeholder="예: 10101"
              maxlength="10"
              required
            />
          </div>

          <div class="field-wrap">
            <label for="name">성명</label>
            <input
              id="name"
              name="name"
              type="text"
              placeholder="예: 홍길동"
              maxlength="20"
              required
            />
          </div>

          <button type="submit" id="submitButton" class="search-btn">
            인증 결과 확인
          </button>
        </form>

        <p id="statusText" class="status-text" aria-live="polite"></p>

        <section id="resultCard" class="result-card hidden" aria-live="polite">
          <div class="result-header">
            <span class="result-label">조회 결과</span>
            <span id="resultChip" class="result-chip">-</span>
          </div>

          <div class="result-main">
            <div>
              <p class="meta-label">학번</p>
              <p id="resultStudentId" class="meta-value">-</p>
            </div>
            <div>
              <p class="meta-label">성명</p>
              <p id="resultName" class="meta-value">-</p>
            </div>
          </div>

          <div class="result-message-wrap">
            <p class="meta-label">안내</p>
            <p id="resultMessage" class="result-message">-</p>
          </div>
        </section>
      </section>
    </main>

    <script src="./assets/app.js"></script>
  </body>
</html>
